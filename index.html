  <title>Zayesh Raut | Visual Architecture</title>

<body class="antialiased bg-paper text-ink selection:bg-ochre selection:text-paper">
  <div id="root"></div>
  <svg class="noise-overlay" aria-hidden="true"
    style="pointer-events:none; position:fixed; z-index:9999; inset:0; opacity:0.05; width:100%; height:100%;">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>
  <script type="module" src="/src/main.jsx"></script>
</body>
